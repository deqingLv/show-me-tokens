      <text class="label" x="304" y="0">SESSION ID</text>
      <rect x="304" y="14" width="220" height="42" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
      <text class="muted small" x="318" y="40">abc-123</text>

      <text class="label" x="548" y="0">MODEL</text>
      <rect x="548" y="14" width="180" height="42" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
      <text class="muted small" x="562" y="40">gm51</text>

