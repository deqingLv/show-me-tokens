<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #e2e8f0; }
      .text { fill: #1e293b; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .muted { fill: #64748b; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .mono { fill: #64748b; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .label { fill: #64748b; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: .08em; }
      .value { fill: #1e293b; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 30px; font-weight: 750; }
      .small { font-size: 14px; }
      .tiny { font-size: 12px; }
      .head { font-size: 22px; font-weight: 760; }
      .title { font-size: 16px; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="900"/>
  <rect x="0" y="0" width="1440" height="78" fill="#f8fafc" stroke="#e2e8f0"/>

  <g transform="translate(80 20)">
    <rect x="0" y="0" width="38" height="38" rx="10" fill="url(#accent)"/>
    <path d="M11 14h16M11 20h22M11 26h12" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <text x="52" y="19" class="text head">show-me-tokens</text>
    <text x="52" y="39" class="muted small">Local AI IDE session token usage</text>
  </g>

  <g transform="translate(1110 20)">
