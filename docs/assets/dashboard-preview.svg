        <rect x="150" width="12" height="12" rx="3" fill="#F59E0B"/><text x="170" y="11" class="muted tiny">Cache read</text>
        <rect x="280" width="12" height="12" rx="3" fill="#8B5CF6"/><text x="300" y="11" class="muted tiny">Output</text>
