    <text x="88" y="25" class="text small" font-weight="600">qoder</text>
    <path d="M204 15l7 8 7-8" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(80 110)" filter="url(#shadow)">
